<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Cloudflare Pages workflow illustration">
  <rect width="1200" height="680" fill="#0f1117"/>
  <text x="72" y="78" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600">Cloudflare Pages workflow</text>
  <text x="72" y="110" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="17">Write → build → upload output → verify domain.</text>

  <rect x="72" y="158" rx="3" ry="3" width="280" height="164" fill="#16181f" stroke="#1f2937" stroke-width="1.5"/>
  <text x="92" y="198" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">1. Build locally</text>
  <text x="92" y="236" fill="#e5e7eb" font-family="'Source Serif 4', Georgia, serif" font-size="20" font-weight="600">Run the build</text>
  <text x="92" y="266" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="15">npm run build</text>
  <text x="92" y="290" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="14">Make sure dist/ looks right</text>

  <rect x="460" y="158" rx="3" ry="3" width="280" height="164" fill="#16181f" stroke="#1f2937" stroke-width="1.5"/>
  <text x="480" y="198" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">2. Deploy</text>
  <text x="480" y="236" fill="#e5e7eb" font-family="'Source Serif 4', Georgia, serif" font-size="20" font-weight="600">Upload the output</text>
  <text x="480" y="266" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="15">wrangler or git push</text>
  <text x="480" y="290" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="14">Only the built folder matters</text>

  <rect x="848" y="158" rx="3" ry="3" width="280" height="164" fill="#16181f" stroke="#1f2937" stroke-width="1.5"/>
  <text x="868" y="198" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">3. Verify</text>
  <text x="868" y="236" fill="#e5e7eb" font-family="'Source Serif 4', Georgia, serif" font-size="20" font-weight="600">Check the domain</text>
  <text x="868" y="266" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="15">DNS + preview + live</text>
  <text x="868" y="290" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="14">Make sure it matches</text>

  <path d="M365 240 h68" stroke="#64748b" stroke-width="2" />
  <polygon points="445,240 432,234 432,246" fill="#64748b"/>
  <path d="M753 240 h68" stroke="#64748b" stroke-width="2" />
  <polygon points="833,240 820,234 820,246" fill="#64748b"/>

  <rect x="140" y="378" rx="3" ry="3" width="920" height="120" fill="#16181f" stroke="#1f2937"/>
  <text x="172" y="430" fill="#e5e7eb" font-family="'Source Serif 4', Georgia, serif" font-size="22" font-weight="600">Keep the process simple</text>
  <text x="172" y="462" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="16">Static sites are easiest when you separate writing, building, and publishing in your head.</text>
</svg>
